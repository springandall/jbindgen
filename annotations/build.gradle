/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id 'java-library'
    id 'maven-publish'
    id 'signing'
}

repositories {
    mavenLocal()
    maven {
        url = uri('https://repo.maven.apache.org/maven2/')
    }
}

group = 'io.github.jni-rs'

// Version configuration
def baseVersion = '0.1.0'
def versionSuffix = project.hasProperty('versionSuffix') ? project.property('versionSuffix') : '-SNAPSHOT'
def allowFullRelease = project.hasProperty('allowFullRelease') ? project.property('allowFullRelease').toBoolean() : false

// Safety check: require explicit flag for full releases (no suffix)
if (versionSuffix.isEmpty() && !allowFullRelease) {
    throw new RuntimeException(
        "\n" +
        "Publishing a full release requires -PallowFullRelease=true.\n" +
        "This prevents accidental releases.\n\n" +
        "Usage: ./gradlew publish -PversionSuffix= -PallowFullRelease=true\n"
    )
}

version = baseVersion + versionSuffix

// Project metadata
def projectName = 'JBindgen Annotations'
def projectDescription = 'Annotations for customizing Rust bindings generation with jbindgen'
def projectUrl = 'https://github.com/jni-rs/jbindgen'
def scmUrl = 'https://github.com/jni-rs/jbindgen'

description = projectDescription
java.sourceCompatibility = JavaVersion.VERSION_1_8

java {
    withSourcesJar()
    withJavadocJar()
}

publishing {
    repositories {
        maven {
            name = "Central"
            def releasesRepoUrl = "https://central.sonatype.com/api/v1/publisher/upload"
            def snapshotsRepoUrl = "https://central.sonatype.com/repository/maven-snapshots/"
            url = version.endsWith('SNAPSHOT') ? snapshotsRepoUrl : releasesRepoUrl

            credentials {
                username = System.getenv("CENTRAL_USERNAME") ?: findProperty("jbindgen.centralUsername")
                password = System.getenv("CENTRAL_TOKEN") ?: findProperty("jbindgen.centralToken")
            }

            // For snapshots only, use basic authentication
            if (version.endsWith('SNAPSHOT')) {
                authentication {
                    basic(BasicAuthentication)
                }
            }
        }
    }

    publications {
        maven(MavenPublication) {
            from(components.java)

            pom {
                name = projectName
                description = projectDescription
                url = projectUrl

                licenses {
                    license {
                        name = 'Apache License, Version 2.0'
                        url = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                        distribution = 'repo'
                    }
                    license {
                        name = 'MIT License'
                        url = 'https://opensource.org/licenses/MIT'
                        distribution = 'repo'
                    }
                }

                developers {
                    developer {
                        name = 'JNI-RS Contributors'
                        url = 'https://github.com/jni-rs/jbindgen/graphs/contributors'
                    }
                }

                scm {
                    connection = "scm:git:git://${scmUrl.replace('https://', '')}.git"
                    developerConnection = "scm:git:ssh://${scmUrl.replace('https://', '')}.git"
                    url = "${scmUrl}/tree/master"
                }
            }
        }
    }
}

signing {
    def signingKey = System.getenv("MAVEN_GPG_PRIVATE_KEY")
    def signingPassword = System.getenv("MAVEN_GPG_PASSPHRASE") ?: findProperty("signing.password")

    if (signingKey && signingPassword) {
        // CI: Use in-memory ASCII-armored keys
        useInMemoryPgpKeys(signingKey, signingPassword)
    } else if (findProperty("signing.gnupg.executable")) {
        // Local: Use GPG agent (prompts for passphrase)
        useGpgCmd()
    } else if (findProperty("signing.keyId")) {
        // Local: Use keyring file (legacy)
        // Properties automatically picked up from gradle.properties
    } else {
        logger.warn("No signing configuration found. Set MAVEN_GPG_PRIVATE_KEY/MAVEN_GPG_PASSPHRASE " +
                    "or configure signing.* properties in gradle.properties")
    }

    sign publishing.publications.maven

    required = { !version.endsWith('-SNAPSHOT') && gradle.taskGraph.hasTask("publish") }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
}
