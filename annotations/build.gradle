/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id 'java-library'
    id 'signing'
    id "com.vanniktech.maven.publish" version "0.36.0"
}

repositories {
    mavenLocal()
    maven {
        url = uri('https://repo.maven.apache.org/maven2/')
    }
}

group = 'io.github.jni-rs'

// Version configuration
def baseVersion = '0.1.0'
def versionSuffix = project.hasProperty('versionSuffix') ? project.property('versionSuffix') : '-SNAPSHOT'
def allowFullRelease = project.hasProperty('allowFullRelease') ? project.property('allowFullRelease').toBoolean() : false

// Safety check: require explicit flag for full releases (no suffix)
if (versionSuffix.isEmpty() && !allowFullRelease) {
    throw new RuntimeException(
        "\n" +
        "Publishing a full release requires -PallowFullRelease=true.\n" +
        "This prevents accidental releases.\n\n" +
        "Usage: ./gradlew publishToMavenCentral -PversionSuffix= -PallowFullRelease=true\n"
    )
}

version = baseVersion + versionSuffix

// Project metadata
def projectName = 'JBindgen Annotations'
def projectDescription = 'Annotations for customizing Rust bindings generation with jbindgen'
def projectUrl = 'https://github.com/jni-rs/jbindgen'
def scmUrl = 'https://github.com/jni-rs/jbindgen'

description = projectDescription
java.sourceCompatibility = JavaVersion.VERSION_1_8

mavenPublishing {
    coordinates(group, 'jbindgen-annotations', version)

    pom {
        name = projectName
        description = projectDescription
        url = projectUrl

        licenses {
            license {
                name = 'The Apache License, Version 2.0'
                url = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                distribution = 'repo'
            }
            license {
                name = 'The MIT License'
                url = 'https://opensource.org/licenses/MIT'
                distribution = 'repo'
            }
        }

        developers {
            developer {
                id = 'jni-rs'
                name = 'JNI-RS Contributors'
                url = 'https://github.com/jni-rs/jbindgen/graphs/contributors'
            }
        }

        scm {
            url = scmUrl
            connection = "scm:git:git://github.com/jni-rs/jbindgen.git"
            developerConnection = "scm:git:ssh://git@github.com/jni-rs/jbindgen.git"
        }
    }

    publishToMavenCentral()

    signAllPublications()
}

signing {
    if (findProperty("signing.gnupg.executable")) {
        // Local: Use GPG agent (prompts for passphrase)
        useGpgCmd()
    }
    sign configurations.runtimeElements
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
}
